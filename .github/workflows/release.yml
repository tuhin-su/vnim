name: CI/CD Release

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  # Job 1: Verifies code health on every branch push and PR
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run Unit Tests
        run: go test -v ./...

  # Job 2: Automatically builds and publishes when a 'v*' tag is pushed successfully
  release:
    name: Build & Publish Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Build Optimized Binaries
        run: |
          VERSION=${{ github.ref_name }} make build-all

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            build/vnim-linux-amd64
            build/vnim-linux-arm64
          draft: false
          prerelease: false
          generate_release_notes: true
          
