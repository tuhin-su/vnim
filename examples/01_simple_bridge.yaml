# VNIM Example 1: Virtual Bridge, VM TAP endpoints, and Services
# This plan establishes a bridge network for virtual machines connected to DHCP and HTTP services.

objects:
  - type: namespace
    name: virtual-lan

  # Central bridge inside the namespace
  - type: bridge
    name: br-lan
    namespace: virtual-lan

  - type: address
    interface: br-lan
    address: 192.168.1.1/24
    namespace: virtual-lan

  # Virtual machine TAP interfaces attached to the bridge
  - type: tap
    name: vm-port1
    owner: ${USER}
    master: br-lan
    namespace: virtual-lan
    mac: 00:aa:bb:cc:dd:01

  - type: tap
    name: vm-port2
    owner: ${USER}
    master: br-lan
    namespace: virtual-lan
    mac: 00:aa:bb:cc:dd:02

  # Virtual private TUN interface inside the namespace (non-bridge attached)
  - type: tun
    name: tun-vpn
    owner: ${USER}
    namespace: virtual-lan

  - type: address
    interface: tun-vpn
    address: 10.8.0.1/24
    namespace: virtual-lan

services:
  # DHCP server providing dynamic IPs for VM endpoints
  - type: dhcp
    interface: br-lan
    subnet: 192.168.1.0/24
    range_start: 192.168.1.20
    range_end: 192.168.1.100
    router: 192.168.1.1
    dns: 1.1.1.1
    static_leases:
      - mac: 00:aa:bb:cc:dd:01
        ip: 192.168.1.31
      - mac: 00:aa:bb:cc:dd:02
        ip: 192.168.1.32

  # HTTP Server serving files on port 8080 inside the namespace
  - type: http
    interface: br-lan
    port: 8080
    root: .
